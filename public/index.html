<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>LLM Chat App</title>
		<style>
			:root {
				--primary-color: #f6821f;
				--primary-hover: #e67e22;
				--light-bg: #f9fafb;
				--border-color: #e5e7eb;
				--text-color: #1f2937;
				--text-light: #6b7280;
				--user-msg-bg: #fff2e6;
				--assistant-msg-bg: #f3f4f6;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
					Cantarell, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				max-width: 1200px;
				margin: 0 auto;
				padding: 1rem;
			}

			[hidden] { display: none !important; }

			header {
				text-align: center;
				margin-bottom: 2rem;
				padding: 1rem 0;
				border-bottom: 1px solid var(--border-color);
			}

			h1 {
				font-size: 1.5rem;
				color: var(--primary-color);
			}

			.chat-container {
				display: flex;
				height: calc(100vh - 200px);
				min-height: 400px;
				border: 1px solid var(--border-color);
				border-radius: 8px;
				overflow: hidden;
			}

			.sidebar {
				width: 320px;
				padding: 1rem;
				border-right: 1px solid var(--border-color);
				background-color: white;
			}

			.sidebar h2 {
				font-size: 1rem;
				margin-bottom: 0.5rem;
			}

			.sidebar p {
				font-size: 0.9rem;
				color: var(--text-light);
				margin-bottom: 0.75rem;
			}

			.settings-group {
				margin-bottom: 1rem;
			}

			.settings-label {
				display: block;
				font-size: 0.9rem;
				font-weight: 600;
				margin-bottom: 0.4rem;
			}

			#model-select,
			#system-prompt {
				width: 100%;
				padding: 0.75rem;
				border: 1px solid var(--border-color);
				border-radius: 4px;
				font-family: inherit;
				background-color: white;
			}

			#model-select {
				min-height: 44px;
			}

			.model-selector-row {
				display: flex;
				gap: 0.45rem;
				align-items: stretch;
			}

			.model-selector-row #model-select {
				flex: 1;
				min-width: 0;
			}

			#copy-model-button {
				border: 1px solid var(--border-color);
				border-radius: 8px;
				background: var(--light-bg);
				color: var(--text-color);
				padding: 0 0.75rem;
				font: inherit;
				font-size: 0.82rem;
				cursor: pointer;
				transition: 0.2s ease;
			}

			#copy-model-button:hover {
				border-color: var(--primary-color);
				color: var(--primary-color);
			}

			#model-select optgroup {
				text-align: center;
				font-weight: 700;
			}

			.model-pricing {
				margin-top: 0.4rem;
				font-size: 0.78rem;
				color: var(--text-light);
			}

			.pricing-title {
				font-weight: 600;
				color: var(--text-color);
				margin-bottom: 0.25rem;
			}

			.pricing-row {
				display: flex;
				justify-content: space-between;
				gap: 0.5rem;
				padding: 0.15rem 0;
				border-bottom: 1px solid var(--border-color);
			}

			.pricing-label {
				font-weight: 600;
				color: var(--text-color);
			}

			.model-controls {
				display: grid;
				gap: 0.65rem;
				margin-top: 0.8rem;
			}

			.model-controls-row {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 0.5rem;
			}

			.model-controls input,
			.model-controls select {
				width: 100%;
				padding: 0.65rem;
				border: 1px solid var(--border-color);
				border-radius: 9px;
				font: inherit;
			}

			#system-prompt {
				min-height: 220px;
				resize: vertical;
			}

			.chat-panel {
				flex: 1;
				display: flex;
				flex-direction: column;
				min-width: 0;
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1rem;
				background-color: var(--light-bg);
			}

			.message {
				margin-bottom: 1rem;
				padding: 0.75rem;
				border-radius: 8px;
				max-width: 80%;
			}

			.message p {
				white-space: pre-line;
				margin: 0;
				overflow-wrap: anywhere;
			}

			.user-message {
				background-color: var(--user-msg-bg);
				align-self: flex-end;
				margin-left: auto;
			}

			.assistant-message {
				background-color: var(--assistant-msg-bg);
				align-self: flex-start;
			}

			.message-input {
				display: flex;
				padding: 0.75rem;
				border-top: 1px solid var(--border-color);
				background-color: white;
			}

			#user-input {
				flex: 1;
				padding: 0.75rem;
				border: 1px solid var(--border-color);
				border-radius: 4px;
				font-family: inherit;
				resize: none;
				min-height: 44px;
			}

			#send-button {
				margin-left: 0.5rem;
				padding: 0 1rem;
				background-color: var(--primary-color);
				color: white;
				border: none;
				border-radius: 4px;
				cursor: pointer;
				transition: background-color 0.2s;
			}

			#send-button:hover {
				background-color: var(--primary-hover);
			}

			#send-button:disabled {
				background-color: var(--text-light);
				cursor: not-allowed;
			}

			.typing-indicator {
				display: none;
				font-style: italic;
				color: var(--text-light);
				padding: 1rem;
			}

			.typing-indicator.visible {
				display: block;
			}

			footer {
				margin-top: 1rem;
				text-align: center;
				font-size: 0.85rem;
				color: var(--text-light);
			}

			/* Modern interface styling */
			:root {
				--primary-color: #f48120;
				--primary-hover: #d9680d;
				--light-bg: #f6f7fb;
				--border-color: #e6e8ef;
				--text-color: #182230;
				--text-light: #758096;
				--user-msg-bg: #fff0e4;
				--assistant-msg-bg: #ffffff;
			}

			body {
				max-width: 1280px;
				background: linear-gradient(135deg, #fffaf6 0%, #f4f6fb 52%, #eef2f8 100%);
				padding: 2rem;
			}

			header {
				margin-bottom: 1.5rem;
				padding: 0.5rem 0 1.25rem;
				border-bottom: 0;
				text-align: left;
			}

			h1 { font-size: 1.85rem; letter-spacing: -0.04em; }
			header p { color: var(--text-light); font-size: 0.9rem; }

			.chat-container {
				height: calc(100vh - 190px);
				min-height: 560px;
				border: 1px solid rgba(230, 232, 239, 0.9);
				border-radius: 18px;
				box-shadow: 0 24px 70px rgba(35, 45, 65, 0.12);
				background: rgba(255, 255, 255, 0.78);
				backdrop-filter: blur(16px);
			}

			.sidebar { width: 350px; padding: 1.5rem; background: rgba(255, 255, 255, 0.72); }
			.sidebar h2 { font-size: 1.15rem; letter-spacing: -0.02em; }
			.sidebar p { line-height: 1.45; }
			.settings-group { margin-bottom: 1.35rem; }
			.settings-label { color: #465269; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; }
			#model-select, #system-prompt, #user-input {
				border-color: #dfe3eb;
				border-radius: 10px;
				box-shadow: 0 2px 8px rgba(35, 45, 65, 0.04);
			}
			#system-prompt { min-height: 190px; }
			.chat-messages { padding: 1.5rem; background: rgba(246, 247, 251, 0.78); }
			.message { padding: 0.9rem 1rem; border: 1px solid rgba(230, 232, 239, 0.9); border-radius: 14px; box-shadow: 0 5px 16px rgba(35, 45, 65, 0.04); }
			.message-input { padding: 1rem 1.25rem; background: rgba(255, 255, 255, 0.9); }
			#user-input { padding: 0.8rem 0.95rem; }
			#send-button { border-radius: 10px; font-weight: 600; }

			@media (max-width: 760px) {
				body { padding: 1rem; }
				.chat-container { height: auto; min-height: calc(100vh - 150px); flex-direction: column; }
				.sidebar { width: 100%; border-right: 0; border-bottom: 1px solid var(--border-color); }
				.chat-panel { min-height: 500px; }
			}
		</style>
	</head>
	<body>
		<header>
			<h1>Cloudflare AI Chat</h1>
			<p id="header-pricing">Cloudflare Workers AI · $0.011 per 1,000 neurons</p>
		</header>

		<div class="chat-container">
			<aside class="sidebar">
				<h2>Settings</h2>
				<p>These values are sent with every request. You can change them here.</p>

				<div class="settings-group">
					<label class="settings-label" for="model-select">Model</label>
					<div class="model-selector-row">
						<select id="model-select"></select>
						<button id="copy-model-button" type="button" title="Copy model ID">Copy</button>
					</div>
					<p id="model-pricing" class="model-pricing"></p>
				</div>

				<div id="system-prompt-group" class="settings-group">
					<label class="settings-label" for="system-prompt">System prompt</label>
					<textarea id="system-prompt">
You are a helpful, friendly assistant. Provide concise and accurate responses.</textarea
					>
				</div>

				<div id="image-controls" class="model-controls" hidden>
					<label class="settings-label" for="image-width">Image size</label>
					<div class="model-controls-row">
						<input id="image-width" type="number" min="256" max="1536" step="64" value="720" aria-label="Image width" />
						<input id="image-height" type="number" min="256" max="1536" step="64" value="1280" aria-label="Image height" />
					</div>
				</div>

				<div id="audio-controls" class="model-controls" hidden>
					<label class="settings-label" for="audio-language">Nova 3 options</label>
					<select id="audio-language">
						<option value="en-US">English (US)</option>
						<option value="multi">Automatic multilingual</option>
						<option value="es">Spanish</option>
						<option value="fr">French</option>
						<option value="de">German</option>
						<option value="hi">Hindi</option>
						<option value="ja">Japanese</option>
					</select>
					<label><input id="audio-detect-language" type="checkbox" checked /> Detect language</label>
					<label><input id="audio-diarize" type="checkbox" /> Identify speakers</label>
					<label><input id="audio-punctuate" type="checkbox" checked /> Punctuation</label>
					<label><input id="audio-smart-format" type="checkbox" checked /> Smart formatting</label>
				</div>
			</aside>

			<div class="chat-panel">
				<div id="chat-messages" class="chat-messages">
					<div class="message assistant-message">
						<p>
							Hello! I'm an LLM chat app powered by Cloudflare Workers AI. How can
							I help you today?
						</p>
					</div>
				</div>

				<div class="typing-indicator" id="typing-indicator">
					AI is thinking...
				</div>

				<div class="message-input">
					<input id="audio-input" type="file" accept="audio/*" hidden />
					<textarea
						id="user-input"
						placeholder="Type your message here..."
						rows="1"
						autofocus
					></textarea>
					<button id="send-button">Send</button>
				</div>
			</div>
		</div>

		<footer>
			<p>Cloudflare Workers AI Chat Template &copy; 2025</p>
		</footer>

		<!-- Chat app script -->
		<script src="chat.js?v=4"></script>
	</body>
</html>
