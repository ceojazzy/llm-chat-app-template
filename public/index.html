<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>LLM Chat App</title>
		<style>
			:root {
				--primary-color: #f6821f;
				--primary-hover: #e67e22;
				--light-bg: #f9fafb;
				--border-color: #e5e7eb;
				--text-color: #1f2937;
				--text-light: #6b7280;
				--user-msg-bg: #fff2e6;
				--assistant-msg-bg: #f3f4f6;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
					Cantarell, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				max-width: 1200px;
				margin: 0 auto;
				padding: 1rem;
			}

			header {
				text-align: center;
				margin-bottom: 2rem;
				padding: 1rem 0;
				border-bottom: 1px solid var(--border-color);
			}

			h1 {
				font-size: 1.5rem;
				color: var(--primary-color);
			}

			.chat-container {
				display: flex;
				height: calc(100vh - 200px);
				min-height: 400px;
				border: 1px solid var(--border-color);
				border-radius: 8px;
				overflow: hidden;
			}

			.sidebar {
				width: 320px;
				padding: 1rem;
				border-right: 1px solid var(--border-color);
				background-color: white;
			}

			.sidebar h2 {
				font-size: 1rem;
				margin-bottom: 0.5rem;
			}

			.sidebar p {
				font-size: 0.9rem;
				color: var(--text-light);
				margin-bottom: 0.75rem;
			}

			.settings-group {
				margin-bottom: 1rem;
			}

			.settings-label {
				display: block;
				font-size: 0.9rem;
				font-weight: 600;
				margin-bottom: 0.4rem;
			}

			#model-select,
			#system-prompt {
				width: 100%;
				padding: 0.75rem;
				border: 1px solid var(--border-color);
				border-radius: 4px;
				font-family: inherit;
				background-color: white;
			}

			#model-select {
				min-height: 44px;
			}

			#system-prompt {
				min-height: 220px;
				resize: vertical;
			}

			.chat-panel {
				flex: 1;
				display: flex;
				flex-direction: column;
				min-width: 0;
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1rem;
				background-color: var(--light-bg);
			}

			.message {
				margin-bottom: 1rem;
				padding: 0.75rem;
				border-radius: 8px;
				max-width: 80%;
			}

			.message p {
				white-space: pre-line;
				margin: 0;
				overflow-wrap: anywhere;
			}

			.user-message {
				background-color: var(--user-msg-bg);
				align-self: flex-end;
				margin-left: auto;
			}

			.assistant-message {
				background-color: var(--assistant-msg-bg);
				align-self: flex-start;
			}

			.message-input {
				display: flex;
				padding: 0.75rem;
				border-top: 1px solid var(--border-color);
				background-color: white;
			}

			#user-input {
				flex: 1;
				padding: 0.75rem;
				border: 1px solid var(--border-color);
				border-radius: 4px;
				font-family: inherit;
				resize: none;
				min-height: 44px;
			}

			#send-button {
				margin-left: 0.5rem;
				padding: 0 1rem;
				background-color: var(--primary-color);
				color: white;
				border: none;
				border-radius: 4px;
				cursor: pointer;
				transition: background-color 0.2s;
			}

			#send-button:hover {
				background-color: var(--primary-hover);
			}

			#send-button:disabled {
				background-color: var(--text-light);
				cursor: not-allowed;
			}

			.typing-indicator {
				display: none;
				font-style: italic;
				color: var(--text-light);
				padding: 1rem;
			}

			.typing-indicator.visible {
				display: block;
			}

			footer {
				margin-top: 1rem;
				text-align: center;
				font-size: 0.85rem;
				color: var(--text-light);
			}
		</style>
	</head>
	<body>
		<header>
			<h1>Cloudflare AI Chat</h1>
			<p>Powered by Cloudflare Workers AI</p>
		</header>

		<div class="chat-container">
			<aside class="sidebar">
				<h2>Settings</h2>
				<p>These values are sent with every request. You can change them here.</p>

				<div class="settings-group">
					<label class="settings-label" for="model-select">Model</label>
					<select id="model-select">
						<option value="openai/gpt-5-chat">OpenAI GPT-5 Chat</option>
						<option value="google/gemini-3.1-pro">Google Gemini 3.1 Pro</option>
						<option value="google/gemini-3.1-flash-lite">Google Gemini 3.1 Flash Lite</option>
						<option value="openai/gpt-5">OpenAI GPT-5</option>
					</select>
				</div>

				<div class="settings-group">
					<label class="settings-label" for="system-prompt">System prompt</label>
					<textarea id="system-prompt">
You are a helpful, friendly assistant. Provide concise and accurate responses.</textarea
					>
				</div>
			</aside>

			<div class="chat-panel">
				<div id="chat-messages" class="chat-messages">
					<div class="message assistant-message">
						<p>
							Hello! I'm an LLM chat app powered by Cloudflare Workers AI. How can
							I help you today?
						</p>
					</div>
				</div>

				<div class="typing-indicator" id="typing-indicator">
					AI is thinking...
				</div>

				<div class="message-input">
					<textarea
						id="user-input"
						placeholder="Type your message here..."
						rows="1"
						autofocus
					></textarea>
					<button id="send-button">Send</button>
				</div>
			</div>
		</div>

		<footer>
			<p>Cloudflare Workers AI Chat Template &copy; 2025</p>
		</footer>

		<!-- Chat app script -->
		<script src="chat.js"></script>
	</body>
</html>
